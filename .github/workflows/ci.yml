name: Django CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stockflow/requirements.txt

      - name: Check Django configuration
        run: |
          python stockflow/manage.py check

      - name: Run Ruff (Linting)
        run: |
          ruff check stockflow

      - name: Apply database migrations
        run: |
          python stockflow/manage.py migrate

      - name: Run Django tests
        run: |
          python stockflow/manage.py test